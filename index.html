<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabaCoin Global</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .btn { background: #27ae60; color: white; padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HabaCoin</h1>
    <p>100 Billion Supply | Global Mining | Private Chat</p>
    <div data-netlify-identity-menu></div>
    <div class="cf-turnstile" data-sitekey="YOUR_SITE_KEY"></div>
    
    <div data-netlify-identity-button></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
        async function linkWallet() {
  if (window.ethereum) {
    try {
      // 1. Request account access
        <div class="cf-turnstile" data-sitekey="YOUR_SITE_KEY"></div>

      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      const walletAddress = accounts[0];

      // 2. Create a message for the user to sign (Proof of Ownership)
      const message = `Linking HabaCoin Profile to: ${walletAddress}`;
      const signature = await window.ethereum.request({
        method: 'personal_sign',
        params: [message, walletAddress],
      });

      // 3. Send address and signature to our Backend (Edge Function)
      const response = await fetch('/api/link-wallet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ walletAddress, signature })
      });

      if (response.ok) alert("Wallet Linked Successfully!");
    } catch (error) {
      console.error("User denied wallet connection", error);
    }
  } else {
    alert("Please install a Crypto Wallet like MetaMask to link your account.");
  }
              }
        
    </script>
</body>
</html>
