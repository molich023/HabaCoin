[build]
  # We leave this empty or use a simple command because GitHub Actions handles the build
  command = "npm run build"
  publish = "dist"

  [[edge_functions]]
  path = "/api/resolve-game"
  function = "resolve-game"

[[edge_functions]]
  path = "/api/ghost-config"
  function = "ghost-config"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  

  
    
